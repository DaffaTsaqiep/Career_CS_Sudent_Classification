[theme]
primaryColor       = "#7c3aed"
backgroundColor    = "#0a0a0f"
secondaryBackgroundColor = "#0d0d1a"
textColor          = "#ffffff"
font               = "sans serif"
 
[server]
headless           = true
enableCORS         = false
enableXsrfProtection = false
 
[browser]
gatherUsageStats   = false
 
[client]
toolbarMode        = "minimal"
